services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: api_inteligente
      POSTGRES_USER: ${DB_USER:-api_inteligente}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-api_inteligente}
    ports:
      - "5432:5432"
    volumes:
      - api-inteligente-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-api_inteligente} -d api_inteligente"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  api-inteligente-data:
